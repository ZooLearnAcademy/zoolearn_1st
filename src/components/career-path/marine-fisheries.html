<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Marine, Aquatic & Fisheries Sciences Careers</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  padding:30px;
  font-family:'Poppins',sans-serif;
  background:#f5fdf8;
  color:#0f172a;
}
.page{max-width:1500px;margin:auto}
h1{text-align:center;color:#14532d;margin-bottom:40px}
.category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:20px}
.category{background:#fff;border-radius:18px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,.06)}
.category-title{text-align:center;font-weight:600;color:#1faa59;margin-bottom:20px}
.career-list{display:flex;flex-direction:column;gap:14px}
.box{background:#f8fffb;border:1px solid #d1fae5;border-radius:14px;padding:14px;cursor:pointer;transition:.25s}
.box:hover{background:#ecfdf5;transform:translateY(-2px)}
.box-title{font-weight:600;color:#2563eb}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.7);display:flex;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:.3s;z-index:1000}
.overlay.active{opacity:1;pointer-events:auto}
.modal{background:#fff;width:900px;border-radius:22px;padding:34px;transition:transform .45s ease}
.modal.shift-left{transform:translateX(-260px)}
.modal h2{text-align:center;color:#14532d}
.content{text-align:center;margin-bottom:24px}
.pathway-title{text-align:center;color:#1faa59;font-weight:700}
.level-label{text-align:center;margin:16px 0;color:#065f46}
.level-row{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.step-box{background:#ecfdf5;border:1px solid #a7f3d0;border-radius:12px;padding:8px 14px;font-weight:600;cursor:pointer}
.step-box:hover{background:#d1fae5}
.down-arrow{text-align:center;font-size:22px;color:#1faa59}
.salary{text-align:center;font-weight:700;color:#15803d;margin-top:20px}
.course-panel{position:fixed;top:0;right:0;width:480px;height:100%;background:#fff;box-shadow:-8px 0 30px rgba(0,0,0,.15);padding:28px;z-index:1200;display:none;opacity:0;transform:translateX(100%);transition:transform .6s cubic-bezier(.22,.61,.36,1),opacity .4s ease}
.course-panel.active{display:block;opacity:1;transform:translateX(0)}
.course-panel h3{color:#14532d}
.course-section{margin-bottom:18px}
.course-section strong{color:#1faa59}
.back-btn{display:inline-block;margin:20px;padding:10px 20px;background:#1faa59;color:white;text-decoration:none;border-radius:8px;font-weight:600}
.back-btn:hover{background:#15803d}
</style>
</head>
<body>
<div class="page">
  <a href="index.html" class="back-btn">← Back to Categories</a>
  <h1>Marine, Aquatic & Fisheries Sciences Careers</h1>
  <div class="category-grid" id="app"></div>
</div>

<div class="overlay" id="overlay" onclick="closeCoursePanel()">
  <div class="modal" id="careerModal" onclick="event.stopPropagation()">
    <h2 id="modalTitle"></h2>
    <div class="content" id="modalDesc"></div>
    <div class="pathway-title">Pathway</div>
    <div class="level-label">Bachelor's Degree (B.Sc)</div>
    <div class="level-row" id="bscRow"></div>
    <div class="down-arrow">↓</div>
    <div class="level-label">Master's Degree (M.Sc)</div>
    <div class="level-row" id="mscRow"></div>
    <div class="down-arrow">↓</div>
    <div class="level-label">Doctoral Degree (Ph.D)</div>
    <div class="level-row" id="phdRow"></div>
    <div class="salary" id="modalSalary"></div>
  </div>
</div>

<div class="course-panel" id="coursePanel" onclick="event.stopPropagation()">
  <h3 id="courseName"></h3>
  <div class="course-section"><strong>Explanation:</strong><p id="courseExp"></p></div>
  <div class="course-section"><strong>Duration:</strong><p id="courseDur"></p></div>
  <div class="course-section"><strong>Importance:</strong><p id="courseImp"></p></div>
</div>

<script>
const courseDetails = {
"B.Sc. Zoology":{exp:"Scientific study of animals covering structure, physiology, behaviour, evolution, genetics and ecology.",dur:"3 years",imp:"This course forms the foundation of animal sciences. It prepares students for higher studies and careers in wildlife biology, ecology, conservation, veterinary research, zoological studies and teaching."},
"B.Sc. Biotechnology":{exp:"Integration of biology with modern technology including genetics, molecular biology and bioinformatics.",dur:"3 years",imp:"This course is central to modern science and industry. It enables careers in biotechnology firms, pharmaceuticals, diagnostics, agriculture and advanced molecular research."},
"B.Sc. Life Sciences":{exp:"Interdisciplinary study of biology at molecular, cellular, organismal and ecological levels.",dur:"3 years",imp:"It provides academic flexibility and a broad base, allowing students to specialize later in diverse biological fields such as ecology, genetics or biotechnology."},
"B.Sc. Marine Biology":{exp:"Study of marine organisms, ocean ecosystems, and marine conservation.",dur:"3 years",imp:"Foundation for careers in marine research, conservation, fisheries, and oceanography."},
"B.Sc. Fisheries Science":{exp:"Study of fish biology, aquaculture, fisheries management, and aquatic ecosystems.",dur:"4 years",imp:"Crucial for careers in fisheries departments, aquaculture industries, and marine resource management."},
"B.Sc. Environmental Science":{exp:"Study of environmental systems, conservation, pollution control, and sustainable development.",dur:"3 years",imp:"Essential for careers in environmental consulting, conservation, policy-making, and sustainability management."},
"B.Sc. Veterinary Science":{exp:"Study of animal health, diseases, surgery, and animal husbandry.",dur:"5 years",imp:"Essential for becoming a veterinarian and for careers in animal healthcare, research, and public health."},
"B.Sc. Oceanography":{exp:"Study of oceans, their physical, chemical, and biological properties.",dur:"3 years",imp:"Essential for marine research, conservation, and ocean resource management."},
"B.Sc. Aquaculture":{exp:"Study of aquatic organism farming, breeding, and management.",dur:"3 years",imp:"Important for sustainable seafood production and aquatic resource management."},
"B.Sc. Geography":{exp:"Study of Earth's landscapes, environments, and human-environment interactions.",dur:"3 years",imp:"Important for environmental planning, conservation, and resource management."},
"M.Sc. Marine Biology":{exp:"Advanced study of marine organisms, ecosystems, and ocean conservation.",dur:"2 years",imp:"Vital for marine research institutions, conservation, and fisheries management."},
"M.Sc. Oceanography":{exp:"Study of physical, chemical, and biological ocean processes.",dur:"2 years",imp:"Important for climate research, marine policy, and ocean resource management."},
"M.Sc. Marine Ecology":{exp:"Specialized study of marine ecosystems and organism-environment interactions.",dur:"2 years",imp:"Supports marine conservation, fisheries, and coastal management."},
"M.Sc. Fisheries Science":{exp:"Advanced fish biology, aquatic resource management, and fisheries technology.",dur:"2 years",imp:"Crucial for sustainable fisheries management and aquaculture development."},
"M.Sc. Aquaculture":{exp:"Advanced aquatic farming techniques, breeding, and management systems.",dur:"2 years",imp:"Supports sustainable seafood production and aquatic resource development."},
"M.Sc. Marine Conservation":{exp:"Study of marine ecosystem protection and conservation strategies.",dur:"2 years",imp:"Important for marine protected area management and conservation."},
"M.Sc. Environmental Management":{exp:"Management of environmental resources and sustainable development.",dur:"2 years",imp:"Key for environmental consulting and corporate sustainability roles."},
"M.Sc. Coral Reef Ecology":{exp:"Study of coral reef ecosystems and conservation.",dur:"2 years",imp:"Important for marine conservation in tropical regions."},
"M.Sc. Coastal Management":{exp:"Management of coastal resources and environments.",dur:"2 years",imp:"Essential for sustainable coastal development."},
"M.Sc. Inland Fisheries":{exp:"Management of freshwater fisheries resources.",dur:"2 years",imp:"Important for sustainable freshwater fisheries."},
"M.Sc. Fish Pathology":{exp:"Study of fish diseases and health management.",dur:"2 years",imp:"Crucial for aquaculture and fisheries health."},
"M.Sc. Ichthyology":{exp:"Specialized study of fish biology and classification.",dur:"2 years",imp:"Important for fisheries management and aquatic research."},
"Ph.D. Marine Biology":{exp:"Advanced marine organism research and ocean ecosystem studies.",dur:"3–5 years",imp:"Ocean conservation leadership and marine research direction."},
"Ph.D. Oceanography":{exp:"Doctoral research on ocean systems, processes, and resources.",dur:"3–6 years",imp:"Climate research, ocean policy, and marine resource management leadership."},
"Ph.D. Marine Ecology":{exp:"Advanced research on marine ecosystems and species interactions.",dur:"3–5 years",imp:"Marine sustainability and conservation research leadership."},
"Ph.D. Fisheries Science":{exp:"Doctoral research on fish biology, fisheries management, and aquaculture.",dur:"3–5 years",imp:"Food security research and fisheries policy development."},
"Ph.D. Aquaculture":{exp:"Advanced research on aquatic farming systems and technologies.",dur:"3–5 years",imp:"Sustainable aquaculture innovation and industry leadership."},
"Ph.D. Marine Conservation":{exp:"Doctoral research on marine ecosystem protection and management.",dur:"3–5 years",imp:"Marine conservation policy and management leadership."},
"Ph.D. Coastal Management":{exp:"Doctoral research on coastal resource management.",dur:"3–5 years",imp:"Coastal conservation and sustainable development leadership."},
"Ph.D. Ichthyology":{exp:"Advanced research on fish biology and classification.",dur:"3–5 years",imp:"Fisheries science and aquatic research leadership."},
"Ph.D. Fish Pathology":{exp:"Doctoral research on fish diseases and health.",dur:"3–5 years",imp:"Aquatic animal health and fisheries management leadership."},
"Ph.D. Coral Reef Studies":{exp:"Advanced research on coral reef ecosystems.",dur:"3–5 years",imp:"Marine conservation and reef management leadership."}
};

const categories = [{
name:"Marine, Aquatic & Fisheries Sciences",
items:[
{title:"Marine Biologist",desc:"Research marine organisms and ecosystems.",bsc:["B.Sc. Zoology","B.Sc. Biotechnology","B.Sc. Life Sciences"],msc:["M.Sc. Marine Biology","M.Sc. Oceanography"],phd:["Ph.D. Marine Biology"],salary:"4–8 LPA"},
{title:"Fisheries Scientist",desc:"Manage aquatic resources.",bsc:["B.Sc. Zoology","B.Sc. Biotechnology","B.Sc. Life Sciences"],msc:["M.Sc. Fisheries Science","M.Sc. Aquaculture"],phd:["Ph.D. Fisheries Science"],salary:"4–7 LPA"},
{title:"Marine Ecologist",desc:"Studies interactions among marine organisms and their environment.",bsc:["B.Sc. Zoology","B.Sc. Marine Biology","B.Sc. Environmental Science"],msc:["M.Sc. Marine Ecology","M.Sc. Oceanography"],phd:["Ph.D. Marine Ecology","Ph.D. Marine Biology"],salary:"5–9 LPA"},
{title:"Oceanographer (Biological)",desc:"Studies biological aspects of oceans, marine life, and ecosystems.",bsc:["B.Sc. Marine Science","B.Sc. Zoology","B.Sc. Oceanography"],msc:["M.Sc. Oceanography","M.Sc. Marine Biology"],phd:["Ph.D. Biological Oceanography","Ph.D. Oceanography"],salary:"6–12 LPA"},
{title:"Aquaculture Specialist",desc:"Manages farming of aquatic organisms like fish, shrimp, and algae.",bsc:["B.Sc. Fisheries Science","B.Sc. Zoology","B.Sc. Aquaculture"],msc:["M.Sc. Aquaculture","M.Sc. Fisheries Science"],phd:["Ph.D. Aquaculture"],salary:"4–8 LPA"},
{title:"Fish Pathologist",desc:"Diagnoses and treats diseases in fish and aquatic animals.",bsc:["B.Sc. Zoology","B.Sc. Fisheries","B.Sc. Veterinary Science"],msc:["M.Sc. Fish Pathology","M.Sc. Aquatic Animal Health"],phd:["Ph.D. Fish Pathology"],salary:"5–9 LPA"},
{title:"Ichthyologist",desc:"Specializes in study of fish species, their biology and classification.",bsc:["B.Sc. Zoology","B.Sc. Fisheries","B.Sc. Marine Biology"],msc:["M.Sc. Ichthyology","M.Sc. Zoology"],phd:["Ph.D. Ichthyology"],salary:"4–8 LPA"},
{title:"Coral Reef Researcher",desc:"Studies coral reef ecosystems, their conservation and restoration.",bsc:["B.Sc. Marine Biology","B.Sc. Zoology","B.Sc. Environmental Science"],msc:["M.Sc. Marine Science","M.Sc. Coral Reef Ecology"],phd:["Ph.D. Coral Reef Studies"],salary:"5–10 LPA"},
{title:"Marine Conservationist",desc:"Works to protect marine ecosystems and species from threats.",bsc:["B.Sc. Marine Biology","B.Sc. Environmental Science","B.Sc. Zoology"],msc:["M.Sc. Marine Conservation","M.Sc. Environmental Management"],phd:["Ph.D. Marine Conservation"],salary:"4–8 LPA"},
{title:"Coastal Zone Manager",desc:"Manages coastal areas balancing development with environmental protection.",bsc:["B.Sc. Environmental Science","B.Sc. Marine Science","B.Sc. Geography"],msc:["M.Sc. Coastal Management","M.Sc. Environmental Management"],phd:["Ph.D. Coastal Zone Management"],salary:"5–10 LPA"},
{title:"Inland Fisheries Officer",desc:"Manages freshwater fisheries resources in rivers, lakes, and reservoirs.",bsc:["B.Sc. Fisheries Science","B.Sc. Zoology","B.Sc. Aquaculture"],msc:["M.Sc. Fisheries Management","M.Sc. Inland Fisheries"],phd:["Optional for research"],salary:"4–7 LPA"}
]}];

const app=document.getElementById("app");
categories.forEach(cat=>{
  const col=document.createElement("div");
  col.className="category";
  col.innerHTML=`<div class="category-title">${cat.name}</div><div class="career-list"></div>`;
  const list=col.querySelector(".career-list");
  cat.items.forEach(c=>{
    const box=document.createElement("div");
    box.className="box";
    box.innerHTML=`<div class="box-title">${c.title}</div>`;
    box.onclick=()=>openCareer(c);
    list.appendChild(box);
  });
  app.appendChild(col);
});
function openCareer(c){
  modalTitle.innerText=c.title;
  modalDesc.innerText=c.desc;
  modalSalary.innerText="The average salary outcome for the following course is: "+c.salary;
  fillRow("bscRow",c.bsc);
  fillRow("mscRow",c.msc);
  fillRow("phdRow",c.phd);
  overlay.classList.add("active");
}
function fillRow(id,arr){
  const row=document.getElementById(id);
  row.innerHTML="";
  arr.forEach(name=>{
    const d=document.createElement("div");
    d.className="step-box";
    d.innerText=name;
    d.onclick=()=>openCourse(name);
    row.appendChild(d);
  });
}
function openCourse(name){
  const data = courseDetails[name];
  if(!data) {
    courseName.innerText=name;
    courseExp.innerText="Detailed information about this course.";
    courseDur.innerText="2-3 years";
    courseImp.innerText="Important course for specialization in this field.";
  } else {
    courseName.innerText=name;
    courseExp.innerText=data.exp;
    courseDur.innerText=data.dur;
    courseImp.innerText=data.imp;
  }
  coursePanel.classList.add("active");
  careerModal.classList.add("shift-left");
}
function closeCoursePanel(){
  coursePanel.classList.remove("active");
  careerModal.classList.remove("shift-left");
  overlay.classList.remove("active");
}
</script>
</body>
</html>
